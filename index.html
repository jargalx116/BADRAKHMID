<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badrakh Gamestore - Midman холбоос</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Dark slate */
            background-image: radial-gradient(circle at 50% 0%, #1e293b, #0f172a 70%);
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3);
            transform: translateY(-3px);
        }
        .midman-avatar {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            object-fit: cover;
        }
        .glass-card:hover .midman-avatar {
            transform: scale(1.08) rotate(-3deg);
        }
        /* Logo animation */
        .logo-glow {
            animation: pulse-glow 3s infinite alternate;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
            100% { box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); }
        }

        /* Sticky Note Style - Keeping it for contrast */
        .sticky-note {
            position: absolute;
            top: -18px;
            right: 10px;
            background-color: #fef08a; /* Bright yellow */
            color: #854d0e; 
            padding: 8px 12px;
            font-size: 11px;
            line-height: 1.2;
            font-weight: 700;
            transform: rotate(4deg);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border-radius: 2px;
            z-index: 30;
            max-width: 120px;
            text-align: center;
        }

        /* Scotch Tape Effect */
        .sticky-note::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
        }
        
        .gaming-text {
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

</body>
